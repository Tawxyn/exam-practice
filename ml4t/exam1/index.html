<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML4T Exam 1 Practice</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f1f5f9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 2rem;
    width: 100%;
    max-width: 680px;
  }
  h1 { font-size: 1.6rem; font-weight: 700; color: #1e293b; margin-bottom: 0.25rem; }
  h2 { font-size: 1.2rem; font-weight: 600; color: #1e293b; margin-bottom: 1rem; }
  .subtitle { color: #64748b; font-size: 0.95rem; margin-bottom: 1.5rem; }
  label { display: block; font-size: 0.9rem; color: #475569; margin-bottom: 0.4rem; }
  select {
    width: 100%;
    padding: 0.6rem 0.8rem;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    font-size: 1rem;
    color: #1e293b;
    background: #f8fafc;
    margin-bottom: 1.25rem;
    appearance: none;
  }
  .btn {
    display: inline-block;
    padding: 0.65rem 1.5rem;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary { background: #e2e8f0; color: #334155; }
  .btn-secondary:hover { background: #cbd5e1; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Quiz header */
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .progress-label { font-size: 0.85rem; color: #64748b; }
  .score-chip {
    background: #eff6ff;
    color: #1d4ed8;
    border-radius: 999px;
    padding: 0.25rem 0.85rem;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .progress-bar-track {
    height: 4px;
    background: #e2e8f0;
    border-radius: 999px;
    margin-bottom: 1.25rem;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: #3b82f6;
    border-radius: 999px;
    transition: width 0.3s;
  }

  /* Scenario */
  .scenario {
    background: #f8fafc;
    border-left: 3px solid #3b82f6;
    border-radius: 6px;
    padding: 0.85rem 1rem;
    margin-bottom: 1.25rem;
    font-size: 0.95rem;
    color: #334155;
    line-height: 1.55;
  }
  .chapter-tag {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #3b82f6;
    margin-bottom: 0.5rem;
  }

  /* Checkboxes */
  .options-list { list-style: none; margin-bottom: 1rem; }
  .options-list li { margin-bottom: 0.5rem; }
  .option-label {
    display: flex;
    align-items: flex-start;
    gap: 0.6rem;
    padding: 0.6rem 0.8rem;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    font-size: 0.93rem;
    color: #334155;
    line-height: 1.45;
  }
  .option-label:hover { border-color: #93c5fd; background: #f0f9ff; }
  .option-label input[type="checkbox"] {
    flex-shrink: 0;
    width: 17px;
    height: 17px;
    margin-top: 2px;
    accent-color: #3b82f6;
    cursor: pointer;
  }
  .option-label.correct {
    border-color: #22c55e;
    background: #f0fdf4;
    color: #166534;
  }
  .option-label.wrong {
    border-color: #ef4444;
    background: #fef2f2;
    color: #991b1b;
  }
  .option-label.missed {
    border-color: #f97316;
    background: #fff7ed;
    color: #9a3412;
  }
  .feedback-icon {
    flex-shrink: 0;
    font-size: 1rem;
    margin-top: 2px;
  }

  /* Warning */
  .warning {
    background: #fffbeb;
    border: 1px solid #fbbf24;
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    font-size: 0.88rem;
    color: #92400e;
    margin-bottom: 0.9rem;
    display: none;
  }
  .warning.visible { display: block; }

  /* Points earned */
  .points-earned {
    font-size: 0.88rem;
    color: #475569;
    margin-bottom: 1rem;
  }
  .points-earned strong { color: #1e293b; }

  /* Button row */
  .btn-row {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  /* Results */
  .results-score {
    text-align: center;
    margin: 1.5rem 0 1rem;
  }
  .score-big {
    font-size: 3rem;
    font-weight: 800;
    color: #1e293b;
    line-height: 1;
  }
  .score-pct {
    font-size: 1.1rem;
    color: #64748b;
    margin-top: 0.25rem;
  }
  .results-breakdown {
    border-top: 1px solid #e2e8f0;
    margin-top: 1.25rem;
    padding-top: 1rem;
  }
  .results-breakdown h3 { font-size: 0.95rem; color: #475569; margin-bottom: 0.6rem; }
  .result-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.88rem;
    color: #334155;
    padding: 0.3rem 0;
    border-bottom: 1px solid #f1f5f9;
  }
  .result-row .pts { font-weight: 600; }
  .result-row .pts.full { color: #16a34a; }
  .result-row .pts.partial { color: #ca8a04; }
  .result-row .pts.zero { color: #dc2626; }

  /* Hidden */
  .hidden { display: none !important; }
</style>
</head>

// ─── State ────────────────────────────────────────────────────────────────────
let state = {
  screen: "landing",   // "landing" | "quiz" | "results"
  weekKey: null,
  questions: [],
  qIndex: 0,
  checked: [],         // bool[5] for current question
  submitted: false,
  scoreTotal: 0,
  maxTotal: 0,
  history: [],         // {pts, max} per question
};

// ─── Render ───────────────────────────────────────────────────────────────────
const app = document.getElementById("app");

function render() {
  if (state.screen === "landing") renderLanding();
  else if (state.screen === "quiz") renderQuiz();
  else renderResults();
}

function renderLanding() {
  const weekKeys = Object.keys(WEEKS);
  app.innerHTML = `
    <h1>ML4T Exam 1 Practice</h1>
    <p class="subtitle">Based on <em>An Introduction to Statistical Learning with Python</em> (ISLP)</p>
    <label for="week-select">Select a week</label>
    <select id="week-select">
      ${weekKeys.map(k => `<option value="${k}">${k}</option>`).join("")}
    </select>
    <div class="btn-row">
      <button class="btn btn-primary" id="start-btn">Start Practice</button>
    </div>
  `;
  document.getElementById("start-btn").addEventListener("click", startQuiz);
}

function startQuiz() {
  const weekKey = document.getElementById("week-select").value;
  state.weekKey = weekKey;
  state.questions = [...WEEKS[weekKey]];
  state.qIndex = 0;
  state.checked = [false,false,false,false,false];
  state.submitted = false;
  state.scoreTotal = 0;
  state.maxTotal = 0;
  state.history = [];
  state.screen = "quiz";
  render();
}

function renderQuiz() {
  const q = state.questions[state.qIndex];
  const total = state.questions.length;
  const qNum = state.qIndex + 1;
  const pct = Math.round(((qNum - 1) / total) * 100);
  const maxSoFar = state.history.length * 5;

  const allChecked = state.checked.every(Boolean);
  const noneChecked = state.checked.every(c => !c);
  const warnVisible = !state.submitted && (allChecked || noneChecked) && state.checked.some((_, i) => true) && state.history.length + 1 > 0;
  // Only show warning after user has interacted (at least one checked or all deliberately unchecked after checking)
  const showWarning = !state.submitted && (allChecked || (noneChecked && state._interacted));

  app.innerHTML = `
    <div class="quiz-header">
      <span class="progress-label">Question ${qNum} of ${total}</span>
      <span class="score-chip">Score: ${state.scoreTotal} / ${maxSoFar} pts</span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" style="width:${pct}%"></div>
    </div>
    <span class="chapter-tag">${q.chapter}</span>
    <div class="scenario">${q.scenario}</div>
    <p style="font-size:0.82rem;color:#64748b;margin-bottom:0.6rem;">Select all statements you believe are <strong>True</strong>. Leave <strong>False</strong> statements unchecked.</p>
    <ul class="options-list" id="options-list">
      ${q.statements.map((s, i) => renderOption(s, i, q)).join("")}
    </ul>
    <div class="warning ${showWarning ? "visible" : ""}" id="warning-banner">
      ⚠️ ${allChecked ? "You've selected all 5 — the question will score 0 points." : "Nothing selected — the question will score 0 points."}
    </div>
    ${state.submitted ? renderFeedback(q) : ""}
    <div class="btn-row" style="margin-top:0.5rem">
      ${!state.submitted
        ? `<button class="btn btn-primary" id="submit-btn">Submit</button>`
        : qNum < total
          ? `<button class="btn btn-primary" id="next-btn">Next Question →</button>`
          : `<button class="btn btn-primary" id="finish-btn">See Results</button>`
      }
    </div>
  `;

  if (!state.submitted) {
    document.querySelectorAll(".option-label input").forEach((cb, i) => {
      cb.addEventListener("change", () => {
        state.checked[i] = cb.checked;
        state._interacted = true;
        render();
      });
    });
    document.getElementById("submit-btn").addEventListener("click", submitQuestion);
  } else {
    document.getElementById("next-btn") && document.getElementById("next-btn").addEventListener("click", nextQuestion);
    document.getElementById("finish-btn") && document.getElementById("finish-btn").addEventListener("click", showResults);
  }
}

function renderOption(s, i, q) {
  const checked = state.checked[i];
  const answer = s.answer;
  let cls = "";
  let icon = "";

  if (state.submitted) {
    const correct = checked === answer;
    if (checked && answer) { cls = "correct"; icon = `<span class="feedback-icon">✓</span>`; }
    else if (!checked && !answer) { cls = "correct"; icon = `<span class="feedback-icon">✓</span>`; }
    else if (checked && !answer) { cls = "wrong"; icon = `<span class="feedback-icon">✗</span>`; }
    else { cls = "missed"; icon = `<span class="feedback-icon">✗</span>`; }
  }

  return `
    <li>
      <label class="option-label ${cls}">
        <input type="checkbox" ${checked ? "checked" : ""} ${state.submitted ? "disabled" : ""} data-idx="${i}">
        <strong>${s.label}.</strong>&nbsp;${s.text}
        ${icon}
      </label>
    </li>
  `;
}

function renderFeedback(q) {
  const last = state.history[state.history.length - 1];
  return `<div class="points-earned">Points earned this question: <strong>${last.pts} / ${last.max}</strong></div>`;
}

function submitQuestion() {
  const q = state.questions[state.qIndex];
  const allChecked = state.checked.every(Boolean);
  const noneChecked = state.checked.every(c => !c);

  let pts = 0;
  if (!allChecked && !noneChecked) {
    for (let i = 0; i < 5; i++) {
      if (state.checked[i] === q.statements[i].answer) pts++;
    }
  }
  const max = 5;
  state.history.push({ pts, max });
  state.scoreTotal += pts;
  state.maxTotal += max;
  state.submitted = true;
  render();
}

function nextQuestion() {
  state.qIndex++;
  state.checked = [false,false,false,false,false];
  state.submitted = false;
  state._interacted = false;
  render();
}

function showResults() {
  state.screen = "results";
  render();
}

function renderResults() {
  const pct = Math.round((state.scoreTotal / state.maxTotal) * 100);
  let grade = pct >= 90 ? "Excellent!" : pct >= 75 ? "Good work!" : pct >= 60 ? "Keep studying." : "Review the material.";

  const rows = state.history.map((h, i) => {
    const cls = h.pts === h.max ? "full" : h.pts === 0 ? "zero" : "partial";
    const q = state.questions[i];
    return `
      <div class="result-row">
        <span>Q${i+1} — ${q.chapter.split("—")[0].trim()}</span>
        <span class="pts ${cls}">${h.pts}/${h.max}</span>
      </div>
    `;
  }).join("");

  app.innerHTML = `
    <h2>Results — ${state.weekKey}</h2>
    <div class="results-score">
      <div class="score-big">${state.scoreTotal}<span style="font-size:1.5rem;font-weight:400;color:#64748b"> / ${state.maxTotal}</span></div>
      <div class="score-pct">${pct}% — ${grade}</div>
    </div>
    <div class="results-breakdown">
      <h3>Per-question breakdown</h3>
      ${rows}
    </div>
    <div class="btn-row" style="margin-top:1.25rem">
      <button class="btn btn-primary" id="retry-btn">Try Again</button>
      <button class="btn btn-secondary" id="home-btn">Change Week</button>
    </div>
  `;

  document.getElementById("retry-btn").addEventListener("click", startQuiz);
  document.getElementById("home-btn").addEventListener("click", () => { state.screen = "landing"; render(); });
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
