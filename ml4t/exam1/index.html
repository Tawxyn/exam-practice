<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML4T Exam 1 Practice</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #e8f0fe 0%, #f1f5f9 60%, #e0f2fe 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(59,130,246,0.10), 0 2px 8px rgba(0,0,0,0.07);
    padding: 2.5rem;
    width: 100%;
    max-width: 760px;
  }
  h1 { font-size: 1.9rem; font-weight: 700; color: #1e293b; margin-bottom: 0.3rem; }
  h2 { font-size: 1.3rem; font-weight: 600; color: #1e293b; margin-bottom: 1rem; }
  .subtitle { color: #64748b; font-size: 1rem; margin-bottom: 1.75rem; }
  label { display: block; font-size: 0.95rem; color: #475569; margin-bottom: 0.5rem; }
  select {
    width: 100%;
    padding: 0.7rem 1rem;
    border: 1.5px solid #cbd5e1;
    border-radius: 10px;
    font-size: 1.05rem;
    color: #1e293b;
    background: #f8fafc;
    margin-bottom: 1.5rem;
    appearance: none;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.7rem 1.6rem;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: #3b82f6; color: #fff; }
  .btn-primary:hover { background: #2563eb; }
  .btn-secondary { background: #e2e8f0; color: #334155; }
  .btn-secondary:hover { background: #cbd5e1; }
  .btn-ghost {
    background: none;
    color: #64748b;
    padding: 0.4rem 0.75rem;
    font-size: 0.9rem;
    font-weight: 500;
    border-radius: 8px;
  }
  .btn-ghost:hover { background: #f1f5f9; color: #334155; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Quiz header */
  .quiz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
  }
  .quiz-header-left {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .progress-label { font-size: 0.92rem; color: #64748b; }
  .score-chip {
    background: #eff6ff;
    color: #1d4ed8;
    border-radius: 999px;
    padding: 0.28rem 1rem;
    font-size: 0.92rem;
    font-weight: 600;
  }
  .progress-bar-track {
    height: 6px;
    background: #e2e8f0;
    border-radius: 999px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #3b82f6, #6366f1);
    border-radius: 999px;
    transition: width 0.35s ease;
  }

  /* Scenario */
  .scenario {
    background: #f8fafc;
    border-left: 4px solid #3b82f6;
    border-radius: 8px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.4rem;
    font-size: 1.05rem;
    color: #1e293b;
    line-height: 1.65;
  }
  .chapter-tag {
    display: inline-block;
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #3b82f6;
    background: #eff6ff;
    padding: 0.2rem 0.65rem;
    border-radius: 999px;
    margin-bottom: 0.75rem;
  }

  /* Checkboxes */
  .options-list { list-style: none; margin-bottom: 1.1rem; }
  .options-list li { margin-bottom: 0.6rem; }
  .option-label {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    font-size: 1rem;
    color: #334155;
    line-height: 1.55;
  }
  .option-label:hover { border-color: #93c5fd; background: #f0f9ff; }
  .option-label input[type="checkbox"] {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    margin-top: 3px;
    accent-color: #3b82f6;
    cursor: pointer;
  }
  .option-label.correct {
    border-color: #22c55e;
    background: #f0fdf4;
    color: #166534;
  }
  .option-label.wrong {
    border-color: #ef4444;
    background: #fef2f2;
    color: #991b1b;
  }
  .option-label.missed {
    border-color: #f97316;
    background: #fff7ed;
    color: #9a3412;
  }
  .feedback-icon {
    flex-shrink: 0;
    font-size: 1.05rem;
    margin-top: 2px;
  }

  /* Warning */
  .warning {
    background: #fffbeb;
    border: 1px solid #fbbf24;
    border-radius: 10px;
    padding: 0.7rem 1rem;
    font-size: 0.95rem;
    color: #92400e;
    margin-bottom: 1rem;
    display: none;
  }
  .warning.visible { display: block; }

  /* Points earned */
  .points-earned {
    font-size: 0.95rem;
    color: #475569;
    margin-bottom: 1rem;
    padding: 0.6rem 0.9rem;
    background: #f8fafc;
    border-radius: 8px;
  }
  .points-earned strong { color: #1e293b; }

  /* Button row */
  .btn-row {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  /* Results */
  .results-score {
    text-align: center;
    margin: 1.75rem 0 1.25rem;
  }
  .score-big {
    font-size: 3.2rem;
    font-weight: 800;
    color: #1e293b;
    line-height: 1;
  }
  .score-pct {
    font-size: 1.15rem;
    color: #64748b;
    margin-top: 0.35rem;
  }
  .results-breakdown {
    border-top: 1px solid #e2e8f0;
    margin-top: 1.5rem;
    padding-top: 1.1rem;
  }
  .results-breakdown h3 { font-size: 1rem; color: #475569; margin-bottom: 0.75rem; }
  .result-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.95rem;
    color: #334155;
    padding: 0.4rem 0;
    border-bottom: 1px solid #f1f5f9;
  }
  .result-row .pts { font-weight: 600; }
  .result-row .pts.full { color: #16a34a; }
  .result-row .pts.partial { color: #ca8a04; }
  .result-row .pts.zero { color: #dc2626; }

  .instructions-note {
    font-size: 0.9rem;
    color: #64748b;
    margin-bottom: 0.9rem;
    line-height: 1.5;
  }
  .question-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: #1e293b;
    margin-bottom: 0.8rem;
  }
  .question-lead {
    font-size: 0.98rem;
    color: #475569;
    margin-bottom: 1rem;
    line-height: 1.6;
  }
  .answer-pattern {
    font-size: 0.95rem;
    color: #334155;
    margin-bottom: 1rem;
    padding: 0.75rem 0.9rem;
    background: #eff6ff;
    border-radius: 8px;
  }
  .answer-pattern strong { color: #1d4ed8; }

  /* Explanation */
  .explanation {
    display: block;
    margin-top: 0.45rem;
    font-size: 0.88rem;
    color: #475569;
    font-style: italic;
    line-height: 1.5;
  }
  .option-label.correct .explanation { color: #15803d; }
  .option-label.wrong .explanation   { color: #b91c1c; }
  .option-label.missed .explanation  { color: #9a3412; }

  /* Hidden */
  .hidden { display: none !important; }
</style>

      scenario: "A portfolio analyst compares three commonly used risk-adjusted performance measures: the Sharpe Ratio, the Sortino Ratio, and Maximum Drawdown. They want to distinguish which type of risk each metric captures.",
      statements: [
        { label: "A", text: "The Sharpe Ratio uses total standard deviation (both upside and downside variability) in its denominator.", answer: true, explanation: "Sharpe = (r_p − r_f) / σ_p, where σ_p is the full standard deviation of returns, treating upside and downside volatility equally." },
        { label: "B", text: "The Sortino Ratio focuses on downside risk by using only downside deviation in its denominator, rather than total standard deviation.", answer: true, explanation: "Sortino replaces the denominator with downside deviation (only negative return periods), penalizing harmful volatility more specifically than Sharpe." },
        { label: "C", text: "Maximum Drawdown measures the maximum peak-to-trough decline in portfolio value as a percentage of the peak value.", answer: true, explanation: "Drawdown = (Peak − Trough) / Peak. It captures the worst loss an investor would have experienced from any high point to the subsequent low." },
        { label: "D", text: "The Sharpe Ratio formula ignores the risk-free rate entirely.", answer: false, explanation: "The Sharpe Ratio numerator is r_p − r_f (excess return). The risk-free rate is a core component of the formula." },
        { label: "E", text: "A higher Sharpe Ratio is generally preferred because it indicates more return earned per unit of risk.", answer: true, explanation: "The chapter interprets Sharpe as return per unit of risk — a higher Sharpe means better risk-adjusted performance, all else equal." },
      ]
    },
    {
      chapter: "WHFRD Ch. 5 — Present Value Calculations",
      scenario: "An analyst discounts several future cash flows at 10% and needs to verify both the mechanics of the present value formula and the intuition behind how discount rates affect value today.",
      statements: [
        { label: "A", text: "The PV of $10,000 due in 1 year at a 10% discount rate is $9,090.91.", answer: true, explanation: "PV = 10,000 / (1.1)¹ = 10,000 / 1.1 = $9,090.91." },
        { label: "B", text: "The PV of $10,000 due in 2 years at a 10% discount rate is $8,264.46.", answer: true, explanation: "PV = 10,000 / (1.1)² = 10,000 / 1.21 = $8,264.46." },
        { label: "C", text: "The sum of PV($10,000 in 1 year) and PV($10,000 in 2 years) at 10% is $17,355.37.", answer: true, explanation: "$9,090.91 + $8,264.46 = $17,355.37. Present values of separate cash flows are additive." },
        { label: "D", text: "The PV of $10,000 in 2 years at 10% can be computed as $10,000 / (1.1).", answer: false, explanation: "A 2-year cash flow requires discounting over 2 periods: $10,000 / (1.1)². Dividing by only (1.1)¹ gives the 1-year PV, not the 2-year PV." },
        { label: "E", text: "A higher discount rate increases the present value of a given future cash flow.", answer: false, explanation: "PV = FV / (1 + r)ⁿ — a higher r increases the denominator, which decreases PV. Higher discount rates make future cash flows worth less today." },
      ]
    },
    {
      chapter: "WHFRD Ch. 5 — Dividend Discount Model",
      scenario: "A stock pays a constant $1 dividend every year forever, and the analyst values the stream by discounting each payment at 8%. They want to understand both the near-term contributions and why very distant payments matter less.",
      statements: [
        { label: "A", text: "The Year-1 present value of $1 discounted at 8% is approximately $0.9259.", answer: true, explanation: "PV = 1 / (1.08)¹ = 1 / 1.08 ≈ 0.9259." },
        { label: "B", text: "The Year-10 present value of $1 discounted at 8% is approximately $0.4632.", answer: true, explanation: "PV = 1 / (1.08)¹⁰ ≈ 1 / 2.1589 ≈ 0.4632." },
        { label: "C", text: "The sum of the discounted dividends for Years 1 through 10 is approximately $6.71.", answer: true, explanation: "The 10-year annuity PV = Σᵢ₌₁¹⁰ 1/(1.08)ⁱ ≈ 6.71 — this is the geometric sum of discounted annual payments." },
        { label: "D", text: "As the horizon extends, the present value contribution of dividends in the far future becomes negligible.", answer: true, explanation: "The discount factor (1.08)ⁿ grows exponentially, so 1/(1.08)ⁿ approaches 0 as n → ∞. Far-future dividends add very little to current PV." },
        { label: "E", text: "The Year-50 present value of $1 at 8% is greater than the Year-1 present value.", answer: false, explanation: "PV at Year 50 = 1/(1.08)⁵⁰ ≈ 0.0213, which is far less than the Year-1 PV of ≈ 0.9259. Longer time horizons yield lower present values." },
      ]
    },
    {
      chapter: "WHFRD Ch. 7 — Portfolio Return Calculation",
      scenario: "A portfolio is allocated 60% to XOM with expected return 8% and 40% to SPY with expected return 10%. The manager wants to compute the total expected return and understand how each holding contributes to it.",
      statements: [
        { label: "A", text: "The portfolio's expected return is 0.6 × 8% + 0.4 × 10% = 8.8%.", answer: true, explanation: "Portfolio return = Σ wᵢ rᵢ = 0.6 × 8% + 0.4 × 10% = 4.8% + 4.0% = 8.8%." },
        { label: "B", text: "The portfolio's expected return must equal the highest constituent return of 10%.", answer: false, explanation: "A weighted average of 8% and 10% lies strictly between them (8.8% here), not at the maximum. Equal weighting would give 9%; the portfolio return equals 10% only if all weight is in SPY." },
        { label: "C", text: "When portfolio weights are positive and sum to 1, the weighted-average return lies between the lowest and highest constituent returns.", answer: true, explanation: "A convex combination of returns w₁r₁ + w₂r₂ with w₁, w₂ ≥ 0 and w₁ + w₂ = 1 must fall between min(r₁, r₂) and max(r₁, r₂)." },
        { label: "D", text: "XOM contributes 4.8 percentage points to the total portfolio return.", answer: true, explanation: "Contribution of XOM = weight × return = 0.6 × 8% = 4.8 percentage points." },
        { label: "E", text: "SPY contributes 0.4 percentage points to the total portfolio return.", answer: false, explanation: "SPY's contribution = 0.4 × 10% = 4.0 percentage points, not 0.4. Confusing the weight (0.4) with the weighted contribution is a common error." },
      ]
    },
    {
      chapter: "WHFRD Ch. 7 — CAPM Decomposition",
      scenario: "A finance student reviews the chapter's CAPM-style decomposition linking a stock's return to market movements and a stock-specific excess component. Evaluate the following statements about that setup.",
      statements: [
        { label: "A", text: "The CAPM equation Return(stock) = β × Return(market) + α represents the chapter's linear decomposition of stock returns.", answer: true, explanation: "The chapter uses this form directly: beta captures market-driven return and alpha captures the excess (non-market) component." },
        { label: "B", text: "Beta (β) is the slope of the regression line when stock returns are regressed on market returns.", answer: true, explanation: "In Y = βX + α, β is the slope — it measures how much the stock return moves per unit change in the market return." },
        { label: "C", text: "Alpha (α) is the intercept of the regression line when stock returns are regressed on market returns.", answer: true, explanation: "In Y = βX + α, α is the intercept — it represents the stock's expected return when the market return is zero (excess return above CAPM prediction)." },
        { label: "D", text: "By convention, the market's own beta is defined as 0.", answer: false, explanation: "The market's beta is defined as 1.0 by construction — it is the benchmark against which all other betas are measured." },
        { label: "E", text: "In the two-asset beta-balanced example in the chapter, the solution is approximately 56% XOM and −44% SPY.", answer: true, explanation: "Solving the system where portfolio beta = 0 with net exposure normalization yields approximately w_XOM ≈ 56% and w_SPY ≈ −44% (a short position in SPY)." },
      ]
    },
  ],
};

// ─── State ────────────────────────────────────────────────────────────────────
let state = {
  screen: "landing",   // "landing" | "quiz" | "results"
  weekKey: null,
  questions: [],
  qIndex: 0,
  checked: [],         // bool[5] for current question
  submitted: false,
  scoreTotal: 0,
  maxTotal: 0,
  history: [],         // {pts, max} per question
};

function normalizeScenarioText(text) {
  return text
    .replace(/\s*(Consider|Evaluate|Assess)\s+the\s+following\s+(statements|claims)(?:\s+about[^.]*)?\.\s*$/i, "")
    .replace(/\s*Consider\s+these\s+statements(?:\s+about[^.]*)?\.\s*$/i, "")
    .replace(/\s*Consider\s+the\s+statements\s+below\.\s*$/i, "")
    .replace(/\s*Evaluate\s+each\s+(statement|diagnostic statement)\.\s*$/i, "")
    .trim();
}

function getLeadText() {
  return "Consider the following statements and indicate whether they are true or false.";
}

function getAnswerPattern(q) {
  return q.statements.map(s => (s.answer ? "T" : "F")).join(", ");
}

// ─── Render ───────────────────────────────────────────────────────────────────
const app = document.getElementById("app");

function render() {
  if (state.screen === "landing") renderLanding();
  else if (state.screen === "quiz") renderQuiz();
  else renderResults();
}

function renderLanding() {
  const weekKeys = Object.keys(WEEKS);
  app.innerHTML = `
    <h1>ML4T Exam 1 Practice</h1>
    <p class="subtitle">Based on <em>ISLP</em> (James et al.), <em>Deep Learning</em> (Bishop et al.), and <em>What Hedge Funds Really Do</em> (Romero &amp; Balch)</p>
    <label for="week-select">Select a week</label>
    <select id="week-select">
      ${weekKeys.map(k => `<option value="${k}">${k}</option>`).join("")}
    </select>
    <div class="btn-row">
      <button class="btn btn-primary" id="start-btn">Start Practice</button>
    </div>
  `;
  document.getElementById("start-btn").addEventListener("click", startQuiz);
}

function startQuiz() {
  const weekKey = document.getElementById("week-select").value;
  state.weekKey = weekKey;
  state.questions = [...WEEKS[weekKey]];
  state.qIndex = 0;
  state.checked = [false,false,false,false,false];
  state.submitted = false;
  state.scoreTotal = 0;
  state.maxTotal = 0;
  state.history = [];
  state.screen = "quiz";
  render();
}

function renderQuiz() {
  const q = state.questions[state.qIndex];
  const total = state.questions.length;
  const qNum = state.qIndex + 1;
  const pct = Math.round(((qNum - 1) / total) * 100);
  const maxSoFar = state.history.length * 5;

  const allChecked = state.checked.every(Boolean);
  const noneChecked = state.checked.every(c => !c);
  const warnVisible = !state.submitted && (allChecked || noneChecked) && state.checked.some((_, i) => true) && state.history.length + 1 > 0;
  // Only show warning after user has interacted (at least one checked or all deliberately unchecked after checking)
  const showWarning = !state.submitted && (allChecked || (noneChecked && state._interacted));

  app.innerHTML = `
    <div class="quiz-header">
      <div class="quiz-header-left">
        <button class="btn btn-ghost" id="back-btn">← Back</button>
        <span class="progress-label">Question ${qNum} of ${total}</span>
      </div>
      <span class="score-chip">Score: ${state.scoreTotal} / ${maxSoFar} pts</span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" style="width:${pct}%"></div>
    </div>
    <span class="chapter-tag">${q.chapter}</span>
    <div class="question-title">Question ${qNum}</div>
    <div class="scenario">${normalizeScenarioText(q.scenario)}</div>
    <p class="question-lead">${getLeadText()}</p>
    <p class="instructions-note">For this interface, check the statements you judge to be <strong>True</strong> and leave the <strong>False</strong> statements unchecked.</p>
    <ul class="options-list" id="options-list">
      ${q.statements.map((s, i) => renderOption(s, i, q)).join("")}
    </ul>
    <div class="warning ${showWarning ? "visible" : ""}" id="warning-banner">
      ⚠️ ${allChecked ? "You've selected all 5 — the question will score 0 points." : "Nothing selected — the question will score 0 points."}
    </div>
    ${state.submitted ? renderFeedback(q) : ""}
    <div class="btn-row" style="margin-top:0.5rem">
      ${!state.submitted
        ? `<button class="btn btn-primary" id="submit-btn">Submit</button>`
        : qNum < total
          ? `<button class="btn btn-primary" id="next-btn">Next Question →</button>`
          : `<button class="btn btn-primary" id="finish-btn">See Results</button>`
      }
    </div>
  `;

  document.getElementById("back-btn").addEventListener("click", () => {
    state.screen = "landing";
    render();
  });

  if (!state.submitted) {
    document.querySelectorAll(".option-label input").forEach((cb, i) => {
      cb.addEventListener("change", () => {
        state.checked[i] = cb.checked;
        state._interacted = true;
        render();
      });
    });
    document.getElementById("submit-btn").addEventListener("click", submitQuestion);
  } else {
    document.getElementById("next-btn") && document.getElementById("next-btn").addEventListener("click", nextQuestion);
    document.getElementById("finish-btn") && document.getElementById("finish-btn").addEventListener("click", showResults);
  }
}

function renderOption(s, i, q) {
  const checked = state.checked[i];
  const answer = s.answer;
  let cls = "";
  let icon = "";

  if (state.submitted) {
    const correct = checked === answer;
    if (checked && answer) { cls = "correct"; icon = `<span class="feedback-icon">✓</span>`; }
    else if (!checked && !answer) { cls = "correct"; icon = `<span class="feedback-icon">✓</span>`; }
    else if (checked && !answer) { cls = "wrong"; icon = `<span class="feedback-icon">✗</span>`; }
    else { cls = "missed"; icon = `<span class="feedback-icon">✗</span>`; }
  }

  return `
    <li>
      <label class="option-label ${cls}">
        <input type="checkbox" ${checked ? "checked" : ""} ${state.submitted ? "disabled" : ""} data-idx="${i}">
        <span style="flex:1"><strong>${s.label}.</strong>&nbsp;${s.text}${state.submitted && s.explanation ? `<span class="explanation">${s.explanation}</span>` : ""}</span>
        ${icon}
      </label>
    </li>
  `;
}

function renderFeedback(q) {
  const last = state.history[state.history.length - 1];
  return `
    <div class="points-earned">Points earned this question: <strong>${last.pts} / ${last.max}</strong></div>
    <div class="answer-pattern"><strong>Answers:</strong> (${getAnswerPattern(q)})</div>
  `;
}

function submitQuestion() {
  const q = state.questions[state.qIndex];
  const allChecked = state.checked.every(Boolean);
  const noneChecked = state.checked.every(c => !c);

  let pts = 0;
  if (!allChecked && !noneChecked) {
    for (let i = 0; i < 5; i++) {
      if (state.checked[i] === q.statements[i].answer) pts++;
    }
  }
  const max = 5;
  state.history.push({ pts, max });
  state.scoreTotal += pts;
  state.maxTotal += max;
  state.submitted = true;
  render();
}

function nextQuestion() {
  state.qIndex++;
  state.checked = [false,false,false,false,false];
  state.submitted = false;
  state._interacted = false;
  render();
}

function showResults() {
  state.screen = "results";
  render();
}

function renderResults() {
  const pct = Math.round((state.scoreTotal / state.maxTotal) * 100);
  let grade = pct >= 90 ? "Excellent!" : pct >= 75 ? "Good work!" : pct >= 60 ? "Keep studying." : "Review the material.";

  const rows = state.history.map((h, i) => {
    const cls = h.pts === h.max ? "full" : h.pts === 0 ? "zero" : "partial";
    const q = state.questions[i];
    return `
      <div class="result-row">
        <span>Q${i+1} — ${q.chapter.split("—")[0].trim()}</span>
        <span class="pts ${cls}">${h.pts}/${h.max}</span>
      </div>
    `;
  }).join("");

  app.innerHTML = `
    <h2>Results — ${state.weekKey}</h2>
    <div class="results-score">
      <div class="score-big">${state.scoreTotal}<span style="font-size:1.5rem;font-weight:400;color:#64748b"> / ${state.maxTotal}</span></div>
      <div class="score-pct">${pct}% — ${grade}</div>
    </div>
    <div class="results-breakdown">
      <h3>Per-question breakdown</h3>
      ${rows}
    </div>
    <div class="btn-row" style="margin-top:1.25rem">
      <button class="btn btn-primary" id="retry-btn">Try Again</button>
      <button class="btn btn-secondary" id="home-btn">Change Week</button>
    </div>
  `;

  document.getElementById("retry-btn").addEventListener("click", startQuiz);
  document.getElementById("home-btn").addEventListener("click", () => { state.screen = "landing"; render(); });
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
